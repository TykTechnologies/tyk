# Go
acl go_proxy  dstdomain proxy.golang.org
acl go_sumdb  dstdomain sum.golang.org vuln.go.dev
acl go_index  dstdomain index.golang.org

# npm
acl npm       dstdomain registry.npmjs.org

# Python
acl python    dstdomain pypi.org files.pythonhosted.org

# Shared - GitHub for private Tyk modules
acl github    dstdomain github.com api.github.com raw.githubusercontent.com

# Go module hosts (proxy.golang.org redirects to GCS for zip downloads)
acl go_hosts  dstdomain buf.build storage.googleapis.com api.osv.dev

http_access allow go_proxy
http_access allow go_sumdb
http_access allow go_index
http_access allow npm
http_access allow python
http_access allow github
http_access allow go_hosts
http_access deny all

http_port 3128
