name: PR Merge Suggestions
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  pull-requests: write
  contents: read

jobs:
  dep-guard:
    if: ${{ github.event_name == 'pull_request' }}
    uses: TykTechnologies/github-actions/.github/workflows/dependency-guard.yml@2b35ab5dd4cfff21ced9d12446e9e27d10bf5785  # main
    permissions:
      contents: read

  branch-suggestions:
    needs: [dep-guard]
    uses: TykTechnologies/github-actions/.github/workflows/branch-suggestion.yml@c0d4c3d3b5db876ba40f03be6d87074ad53c1aea  # main
    secrets:
      JIRA_READ_AUTH: ${{ secrets.JIRA_READ_AUTH }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
