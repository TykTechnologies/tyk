name: PR Merge Suggestions
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  pull-requests: write
  contents: read

jobs:
  branch-suggestions:
    uses: TykTechnologies/github-actions/.github/workflows/branch-suggestion.yml@f867e501af8d103dd4b2a43a53f15c72d7de180f  # main
    secrets:
      JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
