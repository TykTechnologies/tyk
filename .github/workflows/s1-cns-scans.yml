---
name: SentinelOne CNS Scan

on:  # yamllint disable-line rule:truthy
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [master]

jobs:
  s1_scanner:
    uses: TykTechnologies/github-actions/.github/workflows/s1-cns-scan.yml@6c675f850b1ba48da2bcd1b6caa16f9cf154e9e3  # main
    permissions:
      contents: read
    with:
      iac_enabled: false
      tag: service:vulnscan
      scope_type: ACCOUNT
    secrets:
      S1_API_TOKEN: ${{ secrets.S1_API_TOKEN }}
      CONSOLE_URL: ${{ secrets.S1_CONSOLE_URL }}
      SCOPE_ID: ${{ secrets.S1_SCOPE_ID }}
