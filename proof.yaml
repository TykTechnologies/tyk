project:
    name: Tyk API Gateway - Policy Engine
    version: 0.2.0
    description: Formal requirements verification for Tyk API Gateway behavior, with software-layer decomposition for implementation-owned helpers. The top-level model covers gateway-visible policy enforcement, session mutation, configuration loading, observability metadata, identifier generation, compressed payload handling, path containment, network identity discovery, and scoped filesystem access.
    purpose: Ensure correctness and safety of the gateway behaviors that govern API authorization, policy application, rate and quota enforcement, event propagation, generated identifiers, duration serialization, compression integrity, archive path containment, path-component validation, non-loopback IP discovery, policy-file root scoping, and multi-policy merge behavior. Internal packages are modeled as SW requirements only when they implement a gateway-level SYS requirement.
    scope: Current verification covers policy application and policy-store behavior in internal/policy and internal/model; observability metadata helpers in internal/event; generated identifier behavior in internal/uuid; duration formatting/parsing behavior in internal/time; compressed payload behavior in internal/compression; archive and path-component containment behavior in internal/sanitize; node network identity discovery in internal/netutil; and scoped filesystem access behavior in internal/osutil. These packages are not stakeholder stories on their own; they are implementation evidence or SW decompositions under gateway-visible system requirements.
    specs:
        - path: specs/stakeholder
          prefix: STK-REQ
          type: stakeholder
        - path: specs/system
          prefix: SYS-REQ
          type: system
          parent_spec: specs/stakeholder
        - path: specs/software
          prefix: SW-REQ
          type: subsystem
          parent_spec: specs/system
    default_assurance_level: A
    solvers:
        kind2:
            path: /Users/leonidbugaev/tools/kind2/kind2
            timeout: 30
    commands:
        build: go build -tags dev ./config ./ee/middleware/upstreamoauth && go build ./apidef ./apidef/adapter ./apidef/oas ./apidef/mcp ./apidef/streams ./apidef/streams/bento ./apidef/streams/bento/schema ./certs ./checkup ./common/option ./coprocess ./ctx ./dlpython ./internal/crypto ./internal/certcheck ./internal/certusage ./internal/debug2 ./internal/scheduler ./internal/redis ./ee ./ee/middleware/streams ./ee/middleware/upstreambasicauth ./cli ./cli/plugin ./cli/version ./cli/bundler ./cli/importer ./cli/linter ./config ./dnscache ./internal/policy/... ./internal/model ./internal/event ./internal/uuid ./internal/time ./internal/compression ./internal/sanitize ./internal/netutil ./internal/osutil ./internal/rate/model ./internal/memorycache ./pkg/alias/crypto ./pkg/identifier ./pkg/errpack ./pkg/validator ./pkg/schema ./request ./internal/errors ./internal/oasutil ./internal/reflect ./internal/jsonrpc/errors ./internal/mcp ./internal/agentprotocol ./internal/httpctx ./internal/service/core ./internal/service/gojsonschema ./internal/service/newrelic ./internal/cache ./internal/maps ./internal/middleware ./internal/httputil/accesslog ./user
