    obligation_classes:
        - nominal
        - error_handling
        - malformed_input
        - boundary
        - access_denied
        - policy_merge
        - rate_limit_boundary
        - determinism
        - idempotency
        - commutativity
        - monotonicity
        - nil_safety
        - encoding_safety
        - overflow_safety
        - concurrent:
            evidence: [race]
        - atomicity
        - panic_free_input_handling
    evidence_types:
        nominal:
            description: Test asserts expected behavior for a well-formed or explicitly modeled scenario.
    checks:
        coverage_threshold:
            threshold: 90
            auto_link: true
            report_path: .proof/coverage/unit.coverprofile
            format: go-cover
        test_results:
            auto_link: true
            report_path: .proof/test-results/go-test.json
        slow_tests:
            enabled: true
        test_mcdc_annotations:
            enabled: true
        code_signal_obligations_reviewed:
            enabled: true
        code_signal_unbindable:
            enabled: true
        mcdc_coverage:
            advisory: false
            max_no_verifying_tests: 0
            max_missing_row_witnesses: 0
            max_partial_row_coverage: 0
            max_stale_witness_lines: 0
            max_budget_skips: 0
        under_modeled_requirements:
            code_rich_decision_multiplier: 6
            code_rich_decision_floor: 10
        proof_complexity_clean:
            max_formalized_requirements: 75
            max_variables: 85
            max_guarantees: 70
        code_mcdc:
            severity: warn
            engine: go
            min_decision_percent: 100
            min_condition_percent: 100
            max_incomplete_decisions: 0
            targets:
                - id: policy
                  enabled: true
                  language: go
                  scope: ./internal/policy/...
                  test_command: test
                - id: model
                  enabled: true
                  language: go
                  scope: ./internal/model
                  test_command: test
                - id: event
                  enabled: true
                  language: go
                  scope: ./internal/event
                  test_command: test
                - id: uuid
                  enabled: true
                  language: go
                  scope: ./internal/uuid
                  test_command: test
                - id: time
                  enabled: true
                  language: go
                  scope: ./internal/time
                  test_command: test
                - id: compression
                  enabled: true
                  language: go
                  scope: ./internal/compression
                  test_command: test
                - id: sanitize
                  enabled: true
                  language: go
                  scope: ./internal/sanitize
                  test_command: test
                - id: netutil
                  enabled: true
                  language: go
                  scope: ./internal/netutil
                  test_command: test
                - id: osutil
                  enabled: true
                  language: go
                  scope: ./internal/osutil
                  test_command: test
                - id: rate-model
                  enabled: true
                  language: go
                  scope: ./internal/rate/model
                  test_command: test
        evidence_diversity:
            min_classes:
                A: 2
                B: 2
                C: 1
                D: 1
                E: 1
