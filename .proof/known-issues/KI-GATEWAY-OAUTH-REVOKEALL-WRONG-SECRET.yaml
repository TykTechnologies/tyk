id: KI-GATEWAY-OAUTH-REVOKEALL-WRONG-SECRET
title: OAuth revoke-all handler accepts wrong client secret
description: Gateway RevokeAllTokensHandler calls RevokeAllTokens for each matching API but ignores the returned status and error. A request with an existing OAuth client ID and the wrong client_secret can still receive a 200 tokens revoked successfully response instead of surfacing the unauthorized secret failure.
affected_requirements:
    - SYS-REQ-139
    - SW-REQ-126
commands:
    - go test ./gateway -run 'TestGatewayControlAPIStatusHelpers/known_issue_revoke_all_wrong_secret' -count=1
evidence_manifests:
    - .proof/evidence/ki-gateway-oauth-revokeall-wrong-secret.yaml
severity: high
risk: oauth_token_revocation_authorization
cve_surface: possible
affected_api: gateway.(*Gateway).RevokeAllTokensHandler
attacker_input: control API revoke-all request containing an existing OAuth client_id with an incorrect client_secret
reproducer_command: go test ./gateway -run 'TestGatewayControlAPIStatusHelpers/known_issue_revoke_all_wrong_secret' -count=1
introduced_in: 7bffb5d608
minimization_status: candidate
mitigation: Do not rely on the gateway control API revoke-all response as proof that client_secret authorization succeeded until the handler propagates RevokeAllTokens errors; callers that require strong revocation assurance should use a path that validates the secret result.
remediation: Propagate the first non-nil RevokeAllTokens error/status from RevokeAllTokensHandler instead of unconditionally returning success, then convert the reproducer subtest into an expected unauthorized regression test.
customer_impact: A revoke-all request with a wrong OAuth client secret can be reported as successful, which can mislead operators or clients about whether token revocation authorization succeeded.
