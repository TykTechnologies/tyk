id: KI-RATE-QUOTA-HEADER-INT-NARROWING
title: Quota rate-limit headers narrow int64 values through int
description: quotaSender.SendQuotas formats quota max, remaining, and reset values by converting int64 session quota fields to native int before strconv.Itoa. On 32-bit builds, large quota values can overflow before serialization, so response headers can misreport the configured quota state.
affected_requirements:
    - SW-REQ-011
evidence_manifests:
    - .proof/evidence/ki-rate-quota-header-int-narrowing.yaml
severity: medium
risk: quota_header_serialization
cve_surface: none
affected_api: internal/rate.quotaSender.SendQuotas
attacker_input: 'non-attacker trigger: session or API quota fields larger than native int on a 32-bit build'
reproducer_command: rg -n 'strconv\.Itoa\(int\(quota(Max|Remaining|Renews)\)\)' internal/rate/headers.go
mitigation: Fixed in internal/rate.quotaSender.SendQuotas by formatting quotaMax, quotaRemaining, and quotaRenews with strconv.FormatInt so int64 session quota values are serialized without native-int narrowing.
remediation: 'Regression covered by internal/rate/headers_test.go: quota sender preserves MaxInt64 quota header serialization; static reproducer rg -n ''strconv\.Itoa\(int\(quota(Max|Remaining|Renews)\)\)'' internal/rate/headers.go no longer matches.'
customer_impact: On platforms where native int is narrower than int64, large configured quota values can be emitted in X-RateLimit headers as overflowed values rather than the stored quota state.
owner: human:buger
review_date: "2026-07-19"
release_disposition: ship
status: fixed
