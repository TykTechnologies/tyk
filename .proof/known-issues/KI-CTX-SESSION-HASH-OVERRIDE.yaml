id: KI-CTX-SESSION-HASH-OVERRIDE
title: SetSession single hash override ignored
description: ctx.SetSession accepts an optional hashKey variadic override, but the implementation only uses the override when more than one variadic value is supplied. A normal single SetSession(..., true) override is ignored and config.Global().HashKeys is used instead.
affected_requirements:
    - SYS-REQ-125
commands:
    - go test ./ctx -run TestKnownIssue_SetSessionSingleHashOverrideIgnored -count=1
evidence_manifests:
    - .proof/evidence/ki-ctx-session-hash-override.yaml
severity: medium
risk: request_context_session_hashing
cve_surface: none
affected_api: ctx.SetSession
attacker_input: 'non-attacker trigger: caller passes one hashKey override'
reproducer_command: go test ./ctx -run TestKnownIssue_SetSessionSingleHashOverrideIgnored -count=1
minimization_status: minimized
mitigation: Do not rely on the single variadic SetSession hashKey override until the helper uses len(hashKey) > 0; align config.Global().HashKeys with the intended hash behavior for call sites that reach this helper.
remediation: Change SetSession to use the first hashKey override whenever at least one variadic value is supplied, then convert the known-issue reproducer into an expected hashed override regression test.
customer_impact: Call sites that pass one explicit hash override can get session key hashes based on global config rather than the intended caller-specific setting.
