nfpms:
  - id: fips
    vendor: "Tyk Technologies Ltd"
    homepage: "https://tyk.io"
    maintainer: "Tyk <info@tyk.io>"
    description: Dashboard for the Tyk API Gateway. Built with FIPS 140-3 compliant cryptography.
    package_name: tyk-dashboard-fips
    file_name_template: "{{ .ConventionalFileName }}"
    ids:
      - fips-amd64
      - fips-arm64
      - fips-s390x
    formats:
      - deb
      - rpm
    contents:
      - src: "README.md"
        dst: "/opt/share/docs/tyk-dashboard/README.md"
      - src: "ci/install/*"
        dst: "/opt/tyk-dashboard/install"
      - src: ci/install/inits/systemd/system/tyk-dashboard.service
        dst: /lib/systemd/system/tyk-dashboard.service
      - src: ci/install/inits/sysv/init.d/tyk-dashboard
        dst: /etc/init.d/tyk-dashboard
      - src: /opt/tyk-dashboard
        dst: /opt/tyk-analytics
        type: "symlink"
      - src: "EULA.md"
        dst: "/opt/share/docs/tyk-dashboard/EULA.md"
      - src: "portal/*"
        dst: "/opt/tyk-dashboard/portal"
      - src: "utils/scripts/*"
        dst: "/opt/tyk-dashboard/utils/scripts"
      - src: "schemas/*"
        dst: "/opt/tyk-dashboard/schemas"
      - src: "webclient/lang/*"
        dst: "/opt/tyk-dashboard/lang"
      - src: tyk_config_sample.config
        dst: /opt/tyk-dashboard/tyk_analytics.conf
        type: "config|noreplace"
    scripts:
      preinstall: "ci/install/before_install.sh"
      postinstall: "ci/install/post_install.sh"
      postremove: "ci/install/post_remove.sh"
    bindir: "/opt/tyk-dashboard"
    rpm:
      scripts:
        posttrans: ci/install/post_trans.sh
      signature:
        key_file: tyk.io.signing.key
    deb:
      signature:
        key_file: tyk.io.signing.key
        type: origin
