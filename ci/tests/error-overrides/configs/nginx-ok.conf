server {
    listen 80;
    server_name backend-ok localhost;

    location = /get {
        return 200 'Healthy Backend OK';
        add_header Content-Type text/plain;
    }

    location = /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location = /json {
        return 200 '{"status": "ok", "backend": "backend-ok"}';
        add_header Content-Type application/json;
    }

    location / {
        return 404 '{"error": "not_found"}';
        add_header Content-Type application/json;
    }
}
