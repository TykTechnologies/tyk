# yamllint disable rule:line-length
---
services:
  cache:
    image: redis:6
    platform: linux/amd64
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 3s
      interval: 1s
      retries: 60
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    platform: linux/amd64
    command:
      - --config
      - /otel-local-config.yml
    environment:
      TRACETEST_ENDPOINT: tracetest:4317
    ports:
      - 4317:4317
      - 4318:4318
    volumes:
      - ./configs/otelcollector/collector.config.yml:/otel-local-config.yml

  postgres:
    image: postgres:14
    platform: linux/amd64
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      timeout: 5s
      interval: 1s
      retries: 60

  queue:
    image: rabbitmq:3.8-management
    platform: linux/amd64
    healthcheck:
      test:
        - CMD-SHELL
        - rabbitmq-diagnostics -q check_running
      timeout: 5s
      interval: 1s
      retries: 60
    restart: unless-stopped

  tracetest:
    image: kubeshop/tracetest:v1.7.1
    platform: linux/amd64
    command:
      - --provisioning-file
      - /app/provision.yml
    depends_on:
      tyk-checker:
        condition: service_healthy
      otel-collector:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      TRACETEST_DEV: true
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - localhost:11633
      timeout: 3s
      interval: 1s
      retries: 60
    ports:
      - 11633:11633
    volumes:
      - type: bind
        source: ./configs/tracetest/tracetest.yml
        target: /app/tracetest.yml
      - type: bind
        source: ./configs/tracetest/tracetest-provision.yml
        target: /app/provision.yml

  tyk:
    image: ${GATEWAY_IMAGE:-internal/tyk-gateway}
    platform: linux/amd64
    ports:
      - 9000:8080
    env_file:
      - ./configs/tyk.env
    environment:
      - SSL_CERT_FILE=/opt/tyk-gateway/certs/ca.crt
    volumes:
      - ./certs:/opt/tyk-gateway/certs:ro
      - ./apps:/opt/tyk-gateway/apps
      - ./policies:/opt/tyk-gateway/policies
    depends_on:
      cert-generator:
        condition: service_completed_successfully
      redis:
        condition: service_started

  tyk-checker:
    platform: linux/amd64
    image: badouralix/curl-jq
    command: tail -f /dev/null
    depends_on:
      - tyk
    healthcheck:
      test: curl -s --fail http://tyk:8080/hello | jq --exit-status -n 'inputs | if has("status") then .status=="pass" else false end' > /dev/null || exit 1
      interval: 5s
      retries: 10
      start_period: 4s
      timeout: 10s

  redis:
    platform: linux/amd64
    image: redis:6
    command: redis-server --appendonly yes

  httpbin:
    platform: linux/amd64
    image: mccutchen/go-httpbin@sha256:90ac1702685468aa592938e65b2ba1b4757e0c006934a962ef7271a8717aaa3b
    command: ["-https-cert-file", "/certs/httpbin.crt", "-https-key-file", "/certs/httpbin.key"]
    volumes:
      - ./certs:/certs:ro
    depends_on:
      cert-generator:
        condition: service_completed_successfully

  grpcapi:
    platform: linux/amd64
    image: romk/grpc-helloworld-reflection
    ports:
      - 50001:50051

  cert-generator:
    image: alpine:3.19
    volumes:
      - ./certs:/certs
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache openssl
        mkdir -p /certs
        openssl genrsa -out /certs/ca.key 2048
        openssl req -x509 -new -nodes -key /certs/ca.key -sha256 -days 365 -out /certs/ca.crt -subj "/CN=Test CA"
        openssl genrsa -out /certs/httpbin.key 2048
        openssl req -new -key /certs/httpbin.key -out /certs/httpbin.csr -subj "/CN=httpbin"
        echo "subjectAltName=DNS:httpbin,DNS:httpbin.org" > /certs/httpbin_ext.cnf
        openssl x509 -req -in /certs/httpbin.csr -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial -out /certs/httpbin.crt -days 365 -sha256 -extfile /certs/httpbin_ext.cnf
        echo "Certificates generated successfully"
        chmod -R 777 /certs
        ls -la /certs/
        sleep 5
