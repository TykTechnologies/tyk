services:
  redis:
    image: redis
    ports:
      - "0.0.0.0:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 5s
      retries: 10
      start_period: 2s
      timeout: 10s

  bundler:
    build:
      context: ./src
      args:
        - BASE_IMAGE=${GATEWAY_IMAGE}
      
  gw:
    build:
      context: ./extend-python
      args:
        - BASE_IMAGE=${GATEWAY_IMAGE}
    volumes:
      - ./certs:/opt/tyk-gateway/certs:ro
      - ./src/apidef.json:/opt/tyk-gateway/apps/python.json
      - ./src/tyk.conf:/opt/tyk-gateway/tyk.conf
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      - SSL_CERT_FILE=/opt/tyk-gateway/certs/ca.crt
      - TYK_LOGLEVEL=debug
      - TYK_DB_REDISHOST=redis

  gw-checker:
    image: badouralix/curl-jq
    command: tail -f /dev/null
    depends_on:
      - gw
    healthcheck:
      test: curl -s --fail http://gw:8080/hello | jq --exit-status -n 'inputs | if has("status") then .status=="pass" else false end' > /dev/null || exit 1
      interval: 5s
      retries: 10
      start_period: 4s
      timeout: 10s

  httpbin.org:
    image: mccutchen/go-httpbin@sha256:90ac1702685468aa592938e65b2ba1b4757e0c006934a962ef7271a8717aaa3b
    command: ["-https-cert-file", "/certs/httpbin.crt", "-https-key-file", "/certs/httpbin.key"]
    volumes:
      - ./certs:/certs:ro
    depends_on:
      cert-generator:
        condition: service_completed_successfully

  cert-generator:
    image: alpine:3.19
    volumes:
      - ./certs:/certs
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache openssl
        mkdir -p /certs
        openssl genrsa -out /certs/ca.key 2048
        openssl req -x509 -new -nodes -key /certs/ca.key -sha256 -days 365 -out /certs/ca.crt -subj "/CN=Test CA"
        openssl genrsa -out /certs/httpbin.key 2048
        openssl req -new -key /certs/httpbin.key -out /certs/httpbin.csr -subj "/CN=httpbin"
        echo "subjectAltName=DNS:httpbin,DNS:httpbin.org" > /certs/httpbin_ext.cnf
        openssl x509 -req -in /certs/httpbin.csr -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial -out /certs/httpbin.crt -days 365 -sha256 -extfile /certs/httpbin_ext.cnf
        echo "Certificates generated successfully"
        chmod -R 777 /certs
        ls -la /certs/
        sleep 5
