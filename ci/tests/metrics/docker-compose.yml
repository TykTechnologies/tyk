# yamllint disable rule:line-length
---
services:
  redis:
    image: redis:6
    platform: linux/amd64
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 3s
      interval: 1s
      retries: 60
    restart: unless-stopped

  tyk:
    image: ${GATEWAY_IMAGE:-internal/tyk-gateway}
    platform: linux/amd64
    ports:
      - 9000:8080
    env_file:
      - ./profiles/${GW_PROFILE:-default}/tyk.env
    environment:
      - SSL_CERT_FILE=/opt/tyk-gateway/certs/ca.crt
    volumes:
      - ./certs:/opt/tyk-gateway/certs:ro
      - ./apps:/opt/tyk-gateway/apps
    depends_on:
      cert-generator:
        condition: service_completed_successfully
      redis:
        condition: service_started

  tyk-checker:
    platform: linux/amd64
    image: badouralix/curl-jq
    command: tail -f /dev/null
    depends_on:
      - tyk
    healthcheck:
      test: curl -s --fail http://tyk:8080/hello | jq --exit-status -n 'inputs | if has("status") then .status=="pass" else false end' > /dev/null || exit 1
      interval: 5s
      retries: 10
      start_period: 4s
      timeout: 10s

  httpbin:
    platform: linux/amd64
    image: mccutchen/go-httpbin@sha256:90ac1702685468aa592938e65b2ba1b4757e0c006934a962ef7271a8717aaa3b
    command: ["-https-cert-file", "/certs/httpbin.crt", "-https-key-file", "/certs/httpbin.key"]
    volumes:
      - ./certs:/certs:ro
    depends_on:
      cert-generator:
        condition: service_completed_successfully

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    platform: linux/amd64
    command:
      - --config
      - /otel-local-config.yml
    ports:
      - 4317:4317
      - 8889:8889
    volumes:
      - ./configs/otelcollector/collector.config.yml:/otel-local-config.yml

  mcp-server:
    image: tzolov/mcp-everything-server:v3
    platform: linux/amd64
    command: ["node", "dist/index.js", "streamableHttp"]
    expose:
      - "3001"

  prometheus:
    image: prom/prometheus:v2.51.0
    platform: linux/amd64
    ports:
      - 9090:9090
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - http://localhost:9090/-/healthy
      timeout: 3s
      interval: 5s
      retries: 10

  cert-generator:
    image: alpine:3.19
    volumes:
      - ./certs:/certs
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache openssl
        mkdir -p /certs
        openssl genrsa -out /certs/ca.key 2048
        openssl req -x509 -new -nodes -key /certs/ca.key -sha256 -days 365 -out /certs/ca.crt -subj "/CN=Test CA"
        openssl genrsa -out /certs/httpbin.key 2048
        openssl req -new -key /certs/httpbin.key -out /certs/httpbin.csr -subj "/CN=httpbin"
        echo "subjectAltName=DNS:httpbin,DNS:httpbin.org" > /certs/httpbin_ext.cnf
        openssl x509 -req -in /certs/httpbin.csr -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial -out /certs/httpbin.crt -days 365 -sha256 -extfile /certs/httpbin_ext.cnf
        echo "Certificates generated successfully"
        chmod -R 777 /certs
        ls -la /certs/
        sleep 5
