version: "3"
services:
  redis:
    image: redis

  gw:
    depends_on:
      cert-generator:
        condition: service_completed_successfully
    image: ${GATEWAY_IMAGE}
    volumes:
      - ./certs:/opt/tyk-gateway/certs:ro
      - ./foobar-plugin/foobar-plugin_${plugin_version}_${plugin_os}_${plugin_arch}.so:/opt/tyk-gateway/middleware/foobar-plugin.so
      - ./helloworld-plugin/helloworld-plugin_${plugin_version}_${plugin_os}_${plugin_arch}.so:/opt/tyk-gateway/middleware/helloworld-plugin.so
      - ./helloworld-plugin/helloworld-plugin-1.json:/opt/tyk-gateway/apps/helloworld-plugin-1.json
      - ./helloworld-plugin/helloworld-plugin-2.json:/opt/tyk-gateway/apps/helloworld-plugin-2.json
      - ./foobar-plugin/foobar-plugin-1.json:/opt/tyk-gateway/apps/foorbar-plugin-1.json
      - ./foobar-plugin/foobar-plugin-2.json:/opt/tyk-gateway/apps/foorbar-plugin-2.json
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      - SSL_CERT_FILE=/opt/tyk-gateway/certs/ca.crt
      - TYK_LOGLEVEL=debug
      - TYK_DB_REDISHOST=redis

  httpbin.org:
    image: mccutchen/go-httpbin@sha256:90ac1702685468aa592938e65b2ba1b4757e0c006934a962ef7271a8717aaa3b
    command: ["-https-cert-file", "/certs/httpbin.crt", "-https-key-file", "/certs/httpbin.key"]
    volumes:
      - ./certs:/certs:ro
    depends_on:
      cert-generator:
        condition: service_completed_successfully

  cert-generator:
    image: alpine:3.19
    volumes:
      - ./certs:/certs
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache openssl
        mkdir -p /certs
        openssl genrsa -out /certs/ca.key 2048
        openssl req -x509 -new -nodes -key /certs/ca.key -sha256 -days 365 -out /certs/ca.crt -subj "/CN=Test CA"
        openssl genrsa -out /certs/httpbin.key 2048
        openssl req -new -key /certs/httpbin.key -out /certs/httpbin.csr -subj "/CN=httpbin"
        echo "subjectAltName=DNS:httpbin,DNS:httpbin.org" > /certs/httpbin_ext.cnf
        openssl x509 -req -in /certs/httpbin.csr -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial -out /certs/httpbin.crt -days 365 -sha256 -extfile /certs/httpbin_ext.cnf
        echo "Certificates generated successfully"
        chmod -R 777 /certs
        ls -la /certs/
        sleep 5
