component: otel_runtime
no_interface:
    declared: true
    reason: The otel runtime proof slice covers focused local helper behavior under tested inputs only; cross-component runtime integration, external service availability, persistence durability, distributed behavior, and final client-visible behavior are outside this component boundary.
variables:
    - name: otel_runtime_operation_terminal
      type: bool
      direction: output
      description: The otel runtime operation reaches a terminal local result for the focused tested inputs, such as returning the expected value, selecting the expected local branch, surfacing an explicit local error, or preserving the documented local fallback behavior.
