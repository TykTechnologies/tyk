      type: bool
      direction: output
      description: Service-specific client constructors, timeouts, and transport settings produce deterministic local implementation results for the focused tested inputs.
    - name: external_http_client_proxy_selection_determined
      type: bool
      direction: output
      description: Proxy selection, environment proxy use, and proxy bypass behavior produce deterministic local implementation results for the focused tested inputs.
    - name: external_http_client_mtls_loading_determined
      type: bool
      direction: output
      description: mTLS file, certificate-store, and CA-pool loading paths produce deterministic local implementation results or explicit local errors for the focused tested inputs.
    - name: external_http_client_mtls_error_classification_determined
      type: bool
      direction: output
      description: mTLS error classification produces deterministic local implementation results for the focused tested inputs.
    - name: external_http_client_jwk_fetch_determined
      type: bool
      direction: output
      description: JWK fetching through a supplied HTTP client and parser produces deterministic local implementation results for the focused tested inputs.
