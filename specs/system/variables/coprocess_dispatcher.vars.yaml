      type: bool
      direction: input
      description: Gateway or binding code requires the local dispatcher interface surface for dispatch, event, cache, module loading, and reload operations.

    - name: coprocess_dispatcher_surface_available
      type: bool
      direction: output
      description: The coprocess package exposes a Dispatcher interface with the required local method signatures.
