component: gateway_upstream_tls_validation
no_interface:
    declared: true
    reason: The gateway upstream tls validation proof slice covers focused local helper behavior under tested inputs only; cross-component runtime integration, external service availability, persistence durability, distributed behavior, and final client-visible behavior are outside this component boundary.
variables:
    - name: gateway_upstream_tls_pinning_enablement_determined
      type: bool
      direction: output
      description: Public-key pin validation is enabled only when API or global pins are configured for the focused tested inputs.
    - name: gateway_upstream_tls_fingerprint_selection_determined
      type: bool
      direction: output
      description: Pinned public-key fingerprints are selected from API and global pin maps for the focused tested inputs.
    - name: gateway_upstream_tls_pin_match_determined
      type: bool
      direction: output
      description: Upstream public keys matching configured API pins are accepted for the focused tested inputs.
    - name: gateway_upstream_tls_pin_mismatch_determined
      type: bool
      direction: output
      description: Upstream public keys that do not match configured pins are rejected for the focused tested inputs.
    - name: gateway_upstream_tls_disabled_and_global_pins_determined
      type: bool
      direction: output
      description: API pinning-disabled fallback and configured global pin behavior produce deterministic local results for the focused tested inputs.
    - name: gateway_upstream_tls_proxy_pinning_determined
      type: bool
      direction: output
      description: The tested proxy path applies upstream public-key pinning outcomes for the focused tested inputs.
    - name: gateway_upstream_tls_common_name_determined
      type: bool
      direction: output
      description: Forced CommonName validation is applied for the focused direct and proxied upstream inputs.
