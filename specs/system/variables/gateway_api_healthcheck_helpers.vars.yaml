component: gateway_api_healthcheck_helpers
no_interface:
    declared: true
    reason: The gateway API health-check helper proof slice covers local gateway/api_healthcheck.go helper behavior only; Redis durability, sample-retention correctness, asynchronous scheduling beyond observable storage invocation, health endpoint routing, distributed storage availability, and final client-visible health status are outside this component boundary.
variables:
    - name: gateway_api_healthcheck_helpers_operation_requested
      type: bool
      direction: input
      description: A caller requests a local gateway API health-check helper operation such as initialization, counter naming, counter forwarding, rolling-window recording, average calculation, truncation, or health-value aggregation.

    - name: gateway_api_healthcheck_helpers_operation_terminal
      type: bool
      direction: output
      description: 'A local gateway API health-check helper operation reaches a terminal observable result: storage initialization is gated, a counter key is returned, a counter is forwarded, rolling-window storage is invoked, an average or truncated value is returned, or aggregate health values are returned.'
