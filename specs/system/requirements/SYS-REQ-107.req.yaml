id: SYS-REQ-107
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: the mcp_protocol shall always satisfy !mcp_protocol_decision_requested | mcp_protocol_decision_determined
description: MCP protocol helper handling shall determine stable VEM route chains for tool calls, resource reads, prompt gets, and generic operations; reject malformed primitive parameters; classify MCP primitive VEM paths; register MCP and JSON-RPC VEM prefixes; preserve the MCP and JSON-RPC access-right data-model shape consumed by helper flows; preserve the local OAS MCPPrimitive middleware shape used by MCP API-definition helper flows while omitting MCP-incompatible middleware families during extended-path extraction; preserve build-mode-specific MCPPrimitive guard behavior for direct Operation extraction inputs; filter JSON-RPC list-response bodies according to allowed and blocked MCP access-control rules while passing through malformed or unsupported response shapes unmodified; and validate MCP OAS documents against supported embedded schemas with deterministic version selection and validation-error reporting.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
parent: STK-REQ-019
component: mcp_protocol
rationale: This system requirement owns deterministic MCP helper decisions used by gateway JSON-RPC/MCP flows, the local access-right data-model helpers those flows consume, MCP API-definition validation, and the local OAS MCPPrimitive helper shape used by MCP API-definition helper flows. It does not claim gateway middleware sequencing, gateway API loading or API definition synthesis beyond in-process MCP schema validation and local MCPPrimitive extraction helpers, policy merge behavior, session-right retrieval, persistence, analytics recording, network write behavior, or final client transport behavior outside these helpers.
