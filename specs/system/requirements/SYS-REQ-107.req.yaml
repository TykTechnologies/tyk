fretish: the mcp_protocol shall always satisfy !mcp_protocol_decision_requested | mcp_protocol_decision_determined
description: MCP protocol helper handling shall determine stable VEM route chains for tool calls, resource reads, prompt gets, and generic operations; reject malformed primitive parameters; classify MCP primitive VEM paths; register MCP and JSON-RPC VEM prefixes; filter JSON-RPC list-response bodies according to allowed and blocked MCP access-control rules while passing through malformed or unsupported response shapes unmodified; and validate MCP OAS documents against supported embedded schemas with deterministic version selection and validation-error reporting.
