id: SYS-REQ-072
version: 1
status: review
priority: shall
category: functional
req_type: guarantee
fretish: the policy shall always satisfy !clear_requested | policy_found | error_reported
description: ClearSession must detect and reject malformed or invalid inputs. When a policy ID that is empty, malformed, or references a non-existent policy is passed to ClearSession, an appropriate error must be returned. The session must not be modified when an error is reported for malformed inputs.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: Malformed input handling for ClearSession is important because misconfigured API keys with malformed policy references could cause ClearSession to silently skip clearing, leaving stale policy data in the session. This complements SYS-REQ-020 which covers the same pattern for ClearSession error paths.
tags:
    - malformed-input
    - validation
    - clear-session
