id: SYS-REQ-067
version: 1
status: review
priority: shall
category: functional
req_type: guarantee
fretish: the policy shall always satisfy !apply_requested | overflow_safe | bounds_checked
description: All integer arithmetic in policy application shall be bounded and overflow-safe. Rate limit, quota, and complexity calculations use int64 values that could overflow during comparison or assignment. The system must handle edge-case values near INT64_MAX and INT64_MIN without producing incorrect results due to integer overflow.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: Integer overflow in rate limit or quota calculations could produce incorrect access control decisions. For example, adding two large int64 values could wrap to negative, granting unrestricted access. All arithmetic in the policy engine uses comparison operators and single-assignment, which are inherently safe from overflow, but this requirement formalizes the expectation.
