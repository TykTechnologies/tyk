req_type: guarantee
fretish: the policy shall always satisfy !rate_limit_apply_requested | !policy_added | (new_rate >= old_rate)
description: Adding a policy to a session shall never decrease the effective rate limit. The highest-rate-wins merge semantics are monotonic -- the resulting rate after merging N+1 policies is always greater than or equal to the rate after merging N policies. This ensures that granting additional policies to a consumer never restricts their existing rate allowance.
formalization_strategy: fretish
