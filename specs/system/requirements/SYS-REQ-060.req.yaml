    method: ""
    evidence: ""
    verified: false
component: policy
rationale: Tyk's multi-policy model uses highest-rate-wins semantics, meaning more policies equals more (or equal) permissions. If adding a policy could decrease the rate limit, administrators could not safely grant additional policies without risk of reducing existing access. Monotonicity is the formal property that guarantees this.
