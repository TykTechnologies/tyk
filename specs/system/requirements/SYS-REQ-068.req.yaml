id: SYS-REQ-068
version: 1
status: review
priority: shall
category: functional
req_type: guarantee
fretish: the policy shall always satisfy !apply_requested | concurrent_safe | data_race_free
description: Concurrent calls to Apply() with different sessions shall not produce data races or corrupt shared state. The policy engine uses a per-service store that is read during Apply, and concurrent reads must not interfere with each other. While Apply does not mutate the store, it reads policy data that could be modified concurrently by store updates.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: In production, the gateway handles multiple API requests concurrently. If Apply is called concurrently on different sessions while the store is being updated, the shared store access must be safe. The implementation currently uses sync.RWMutex-protected store access but this requirement makes the concurrent safety expectation explicit.
tags:
