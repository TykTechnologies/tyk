fretish: the plugin_bundle_cli shall always satisfy !plugin_bundle_operation_requested | plugin_bundle_result_determined
description: Gateway plugin bundle CLI support shall determine local bundle command results by registering the bundle build command and flags, loading JSON manifests, rejecting missing manifests, malformed JSON, missing driver configuration, missing hooks, and missing referenced files, computing checksums over bundled file bytes, writing ZIP archives containing bundled files and an updated manifest, supporting unsigned bundle output when skip-signing is set, signing bundled bytes with a configured RSA private key, and storing a verifiable base64 signature without claiming gateway-side signature verification, plugin loading, plugin execution, bundle distribution, persistence, hot reload, or final gateway request behavior.
