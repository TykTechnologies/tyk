req_type: guarantee
fretish: the observability shall always satisfy !event_metadata_exchange_requested | event_metadata_result_preserved
description: Gateway observability metadata shall preserve stable event display names, accumulated request-context event slices, serializable HTTP request snapshots, structured diagnostic error classifications, and access-log record field maps so event handlers, analytics, audit flows, access logs, and error-override consumers receive the intended metadata, including explicit empty snapshots when request encoding fails, stable response flags/details for classified failures, configured access-log record fields, and exact configured access-log fields plus the prefix field when filtering is enabled.
formalization_strategy: fretish
