rationale: Gateway event handlers, metadata builders, access logs, and error-override consumers rely on stable event strings, accumulated request-context events, encoded request snapshots, structured diagnostic classification metadata, and configured access-log field filtering. The concrete internal/event helper implementation is decomposed into SW-REQ-004, the concrete internal/errors classification implementation is decomposed into SW-REQ-041, and the concrete access-log field filter is decomposed into SW-REQ-046.
