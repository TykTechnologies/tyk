description: Gateway observability metadata shall preserve stable event display names, accumulated request-context event slices, serializable HTTP request snapshots, structured diagnostic error classifications, typed diagnostic error package metadata, and access-log record field maps so event handlers, analytics, audit flows, access logs, validation helpers, model helpers, OAS helpers, and error-override consumers receive the intended metadata, including explicit empty snapshots when request encoding fails, stable response flags/details for classified failures, stable typed error classifications and log-level metadata, configured access-log record fields, and exact configured access-log fields plus the prefix field when filtering is enabled.
