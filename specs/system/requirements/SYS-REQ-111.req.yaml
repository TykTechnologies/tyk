rationale: This system requirement owns local certificate lifecycle support behavior used by certificate-consuming gateway flows. It does not claim network TLS negotiation, runtime authentication enforcement, upstream certificate validation, external storage durability, MDCB availability, expiry monitoring jobs, or final gateway request admission behavior.
