id: SYS-REQ-111
version: 1
status: approved
priority: shall
category: security
req_type: guarantee
fretish: the certificate_lifecycle shall always satisfy !certificate_material_operation_requested | certificate_material_result_determined
description: Gateway certificate lifecycle support shall determine local certificate and public-key lifecycle results by constructing managers with default and configured retry/cache settings, parsing encrypted or unencrypted PEM blocks, deriving stable certificate and public-key IDs, rejecting malformed, expired, duplicate, mixed public-key/certificate, multiple-private-key, and mismatched private-key material, storing certificate chains with encrypted private keys, preserving organization-scoped indexes, listing storage-backed and file-backed certificates according to public/private/any modes, listing and parsing public keys, returning raw stored material, deleting storage/cache/index entries, building CA pools from certificate entries while skipping raw public keys, and exposing certificate metadata and masked IDs without claiming TLS handshake enforcement, mutual-TLS request authentication, upstream TLS validation, live MDCB availability, Redis durability, certificate expiry monitoring, or gateway request admission.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
