fretish: the policy shall always satisfy !rate_limit_apply_requested | !multiple_policies | (rate_merge_AB = rate_merge_BA)
description: Rate limit merge shall be commutative -- applying rate limits from policies [A, B] shall produce the same session rate as applying from [B, A]. The highest-rate-wins comparison is inherently order-independent for strict inequalities, but equal-rate tie-breaking must also be order-independent.
