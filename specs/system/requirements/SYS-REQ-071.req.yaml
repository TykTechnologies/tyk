id: SYS-REQ-071
version: 1
status: review
priority: shall
category: functional
req_type: guarantee
fretish: the policy shall always satisfy !clear_requested | clear_results_equal
description: ClearSession must be idempotent. Calling ClearSession twice on the same session with the same policy shall produce the same final session state as calling it once. After the first clear resets quota, rate, and complexity to zero, a second clear must leave those values at zero without error.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: ClearSession may be called multiple times in production due to retries or middleware re-entry. If clearing is not idempotent, repeated calls could reset values that were intentionally set between clear calls, or could produce errors on subsequent calls for an already-cleared session.
tags:
    - idempotency
    - session-management
    - clear-session
