id: SYS-REQ-069
version: 1
status: review
priority: shall
category: functional
req_type: guarantee
fretish: the policy shall always satisfy !apply_requested | !error_reported | !session_modified
description: Policy application shall be all-or-nothing. When Apply encounters an error during processing of any policy in a multi-policy session, no policy fields shall be merged into the session. Partial application is a security risk because it could grant access rights based on a subset of applicable policies.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: If an error occurs during the processing of the second policy in a three-policy session, but the first policy's fields have already been merged, the session enters a corrupted state. Atomicity ensures that either all policies are applied or none are, maintaining session integrity.
tags:
    - atomicity
    - error-handling
    - security
