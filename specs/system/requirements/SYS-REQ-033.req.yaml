description: |-
    COMPONENT OVERVIEW: The policy package implements Tyk API Gateway's policy merging engine. It takes a session (API key) referencing one or more policies and applies those policies to the session, producing merged access rights, rate limits, quotas, tags, metadata, and complexity limits.

    ARCHITECTURE: The Service struct holds a policy store and logger. Apply() iterates over policy IDs, looks up each policy, validates org ownership, and dispatches to either applyPerAPI() or applyPartitions() based on the PerAPI flag. ClearSession() resets session values before application. ApplyRateLimits() implements the highest-rate-wins merge. ApplyEndpointLevelLimits() merges per-endpoint rate limits. MergeAllowedURLs() merges per-URL ACLs. The Store and StoreMap provide policy lookup.

    DESIGN DECISIONS: (1) Highest value wins for rate limits and quotas, ensuring the most permissive policy governs. (2) Per-API mode and partition mode are mutually exclusive. (3) Missing policies are skipped when multiple policies exist but cause errors for single-policy sessions. (4) Org ID mismatch is a hard error (security boundary). (5) Session clearing happens before application to prevent stale values from surviving.
