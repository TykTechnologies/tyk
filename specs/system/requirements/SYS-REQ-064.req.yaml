description: ClearSession shall handle nil or zero-valued session fields safely. When clearing a session whose quota, rate limit, or complexity fields are already nil or zero, ClearSession shall complete without panic or error. Nil maps, nil slices, and zero-valued structs in the session must not cause nil pointer dereferences during clearing.
