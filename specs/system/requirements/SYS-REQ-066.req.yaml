id: SYS-REQ-066
version: 1
status: review
priority: shall
category: non-functional
req_type: guarantee
fretish: the policy shall always satisfy !rpc_data_load_requested | encoding_roundtrip_safe
description: Policy data loaded via RPC (json.Marshal/json.Unmarshal) shall survive encoding round-trips without data loss or corruption. Specifically, all policy fields used by Apply -- including nested maps, slices, and numeric types -- shall marshal to JSON and unmarshal back to identical Go values. Empty slices, nil maps, zero-valued numerics, and Unicode strings in metadata keys must all round-trip correctly.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: Policy data is transmitted between the Tyk dashboard and gateway via RPC using JSON serialization. If any policy field does not survive the marshal/unmarshal round-trip, the gateway operates on corrupted policy data. Known risks include nil vs empty slice distinction, float64 precision loss for large integers, and map key ordering changes.
