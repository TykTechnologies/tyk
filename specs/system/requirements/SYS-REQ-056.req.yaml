version: 1
status: review
priority: shall
category: functional
req_type: guarantee
fretish: the policy shall always satisfy !apply_requested | apply_results_equal
description: Calling Apply twice on the same session with the same policies shall produce the same session state. Apply is idempotent -- repeated application does not accumulate or alter fields beyond the first application. Tags, metadata, and access rights shall not be duplicated or modified by a second Apply call.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: In production, Apply may be called multiple times on the same session due to retries, cache refreshes, or middleware re-entry. If Apply is not idempotent, repeated calls would accumulate tags, duplicate access rights, or drift rate limits, producing incorrect session state.
