req_type: guarantee
fretish: the policy shall always satisfy !apply_requested | !single_api_has_policies | session_fields_from_specific_api
description: When Apply processes a session with multiple access rights entries but only one API has policies applied, session-level fields (rate limit, quota, ACL) shall be set from that specific API's access right, not from arbitrary map iteration order. The QuotaRenews bug demonstrated that iterating AccessRights as a map produces non-deterministic field selection when multiple entries exist.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: Go map iteration order is randomized. When Apply iterates session.AccessRights to find the API with applied policies, different iteration orders can select different access right entries, producing different QuotaRenews, Rate, and Per values. This was the root cause of the QuotaRenews non-determinism bug.
