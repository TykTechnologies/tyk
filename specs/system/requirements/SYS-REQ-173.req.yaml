fretish: the http_server_header_helpers shall always satisfy (http_connection_watcher_determined & http_basic_auth_header_determined)
description: "HTTP server and header helper handling shall preserve deterministic local helper results for two focused behaviors: constructing connection watchers with zero count, applying explicit and connection-state count deltas, leaving non-counting connection states unchanged, and reporting the current count; and constructing Basic Authorization header values from username and password pairs. This requirement does not claim nonnegative connection-count enforcement, full server lifecycle management, upstream authentication, credential validation, transport security, analytics, persistence, or final client responses."
