fretish: the policy shall always satisfy !rate_limit_apply_requested | !endpoint_limit_apply_requested | !apply_requested | nil_safe_execution
description: Rate limit application, endpoint limit merging, and error handling must be nil-safe. Nil or invalid session fields, nil policy references, and nil API limit structs must not cause panics or undefined behavior. Each operation must check inputs before dereferencing and return errors gracefully for nil/invalid inputs.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: Nil safety for rate limit and endpoint operations is critical because gateway middleware may construct partial sessions or API limit structs. A nil map, nil slice, or zero-valued struct must not cause a panic that crashes the gateway process. This extends the nil safety guarantees of SYS-REQ-064/065 to rate limit and endpoint limit operations.
