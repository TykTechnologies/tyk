id: SYS-REQ-074
version: 1
status: review
priority: shall
category: functional
req_type: guarantee
fretish: the policy shall always satisfy !endpoint_limit_apply_requested | error_reported | endpoints_merged
description: ApplyEndpointLevelLimits must gracefully handle error conditions. When invalid endpoint data is provided, an appropriate error must be returned and the session must not be modified. Error scenarios include nil endpoint slices, malformed endpoint definitions, and incompatible endpoint configurations.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: Endpoint-level limit operations may receive incomplete or invalid data from upstream configuration sources. Graceful error handling prevents partial endpoint limit application that could cause incorrect per-endpoint rate limiting decisions.
tags:
    - error-handling
    - endpoint-limits
    - graceful-degradation
