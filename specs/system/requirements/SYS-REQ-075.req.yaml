id: SYS-REQ-075
version: 1
status: review
priority: shall
category: functional
req_type: guarantee
fretish: the policy shall always satisfy !apply_requested | !clear_requested | !store_available | panic_free
description: All policy engine entry points must handle edge-case inputs without panicking. Specifically, nil sessions, zero-value sessions, sessions with nil AccessRights maps, sessions with empty or malformed policy IDs, and concurrent read/write on shared state must never cause a panic. The component must return an error for invalid inputs rather than crashing the gateway process.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: A panic in the policy engine crashes the entire gateway process, affecting all APIs and consumers. The engine must be resilient to all edge-case inputs, including nil sessions, sessions constructed by middleware with partial initialization, and concurrent access patterns. This is especially important for ClearSession which is called during hot-reload scenarios.
