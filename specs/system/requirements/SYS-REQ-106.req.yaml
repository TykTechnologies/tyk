id: SYS-REQ-106
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: the jsonrpc_errors shall always satisfy !jsonrpc_error_response_requested | jsonrpc_error_response_determined
description: JSON-RPC error handling shall map HTTP success statuses to no error code, map known HTTP error statuses to stable JSON-RPC standard or server-defined error codes, map unknown 4xx and 5xx statuses to deterministic fallback error codes, and write JSON-RPC 2.0 error responses with the mapped code, message, original HTTP status, request identifier when encodable, application/json content type, and requested HTTP status.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
parent: STK-REQ-018
component: jsonrpc_errors
rationale: This system requirement owns the client-visible JSON-RPC error mapping and envelope body produced by the error helper package. It does not claim gateway middleware routing, JSON-RPC request parsing, authorization decisions that choose the HTTP status, analytics recording, or network write success after the response is handed to net/http.
