rationale: This system requirement owns focused upstream public-key pinning and CommonName validation behavior only. Its formal model is decomposed into pin enablement, fingerprint selection, match, mismatch, disabled/global behavior, proxy pinning, and CommonName outputs so each behavior can be reviewed and witnessed independently. Broader TLS transport and certificate-management semantics remain outside this proof slice.
