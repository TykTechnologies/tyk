fretish: the gateway_upstream_tls_validation shall always satisfy (gateway_upstream_tls_pinning_enablement_determined & gateway_upstream_tls_fingerprint_selection_determined & gateway_upstream_tls_pin_match_determined & gateway_upstream_tls_pin_mismatch_determined & gateway_upstream_tls_disabled_and_global_pins_determined & gateway_upstream_tls_proxy_pinning_determined & gateway_upstream_tls_common_name_determined)
description: "Gateway upstream TLS validation shall preserve seven focused mechanisms: public-key pin enablement, pinned fingerprint selection from API and global maps, API pin match acceptance, pin mismatch rejection, API pinning-disabled fallback and global pin behavior, tested proxy pinning behavior, and forced CommonName validation for tested direct and proxied upstream inputs. This requirement does not claim complete TLS handshake semantics, certificate chain policy correctness, arbitrary proxy behavior, downstream client certificate selection, TLS version or cipher policy, certificate material storage durability, route generation, authentication enforcement, distributed synchronization, or final client-visible gateway behavior outside the focused upstream TLS validation tests."
