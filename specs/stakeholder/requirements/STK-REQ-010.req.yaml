          testable: true
          verification_method: test
          derived_reqs:
            - SYS-REQ-083
        - id: STK-REQ-010-AC-03
          text: Given an internal UUID generation error, when the panic guard receives that error, then it fails loudly with the supplied context message instead of returning an ambiguous identifier.
          testable: true
          verification_method: test
          derived_reqs:
            - SYS-REQ-083
