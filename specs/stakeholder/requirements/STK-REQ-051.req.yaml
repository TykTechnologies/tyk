        - id: STK-REQ-051-AC-01
          text: Given local control API response and routing helpers, when success, error, JSON write, export, method-not-allowed, secure-header, allowed-method, or organization API lookup paths are exercised, then deterministic status objects, content type, status code, body, download headers, secure no-cache headers, allowed-method dispatch, and organization API lookup or list results are produced.
