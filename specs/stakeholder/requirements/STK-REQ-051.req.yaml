    acceptance_criteria:
        - id: STK-REQ-051-AC-01
          text: Given local control API response and routing helpers, when success, error, JSON write, export, method-not-allowed, secure-header, allowed-method, API/OAS route dispatch, OAS export, reload handler, organization API lookup, API definition inventory list/get, OAS inventory list/get, API add/update/delete, local persistence, or OAuth client management helper paths are exercised, then deterministic status objects, content type, status code, body, download headers, secure no-cache headers, allowed-method dispatch, route wrapper status/header outcomes, reload scheduling/status outcomes, API lookup or list results, OAS extension shaping, add/update/delete status outcomes, filesystem write outcomes, OAuth client helper outcomes, or explicit error statuses are produced.
          verification_method: test
          derived_reqs:
            - SYS-REQ-139
        - id: STK-REQ-051-AC-02
          text: Given static mTLS certificate bindings on key create or update requests, when bindings reference existing certificates or newly added certificates, then the control API accepts them; when bindings reference missing or wrong-scope certificates, then the control API rejects them.
          verification_method: test
          derived_reqs:
