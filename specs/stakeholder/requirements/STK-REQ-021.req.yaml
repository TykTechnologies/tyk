stakeholder:
    persona: Gateway cache caller
    story: As gateway helper code, I need in-process cache operations to store values, respect expiration, and clean up safely so repeated request handling can rely on deterministic local state.
    acceptance_criteria:
        - id: STK-REQ-021-AC-01
          text: Given a cache item stored with a non-expired TTL, when the item is retrieved, counted, listed, deleted, flushed, or closed, then the helper returns deterministic in-memory state changes.
          testable: true
          derived_reqs:
            - SYS-REQ-109
        - id: STK-REQ-021-AC-02
          text: Given expired, default-expiration, negative-expiration, or missing cache entries, when cache helpers inspect them, then expired entries are not returned as live items and missing entries return a negative lookup result.
          testable: true
          derived_reqs:
            - SYS-REQ-109
        - id: STK-REQ-021-AC-03
          text: Given a janitor with a cleanup interval, when it runs and is closed sequentially or concurrently, then cleanup is invoked before close and repeated close calls do not panic or deadlock.
          testable: true
          derived_reqs:
            - SYS-REQ-109
