id: STK-REQ-018
version: 1
status: rejected
priority: shall
category: functional
req_type: guarantee
fretish: ""
description: JSON-RPC clients shall receive stable JSON-RPC 2.0 error envelopes when gateway request handling rejects or fails a JSON-RPC request, so clients can distinguish protocol, authentication, authorization, rate-limit, upstream, and internal failures without relying only on HTTP status text.
formalization_strategy: informal
