rationale: JSON-RPC error envelopes are client-visible protocol behavior. This requirement owns stable HTTP-to-JSON-RPC error mapping and response envelope construction only; it does not claim JSON-RPC method routing, request parsing, middleware authorization decisions, analytics persistence, or gateway transport behavior outside the error mapper/writer helpers.
