stakeholder:
    persona: Gateway operator
    story: As a gateway operator, I need local CLI command setup for start flags, plugin load checks, and version reporting to behave predictably before I rely on the gateway binary.
    acceptance_criteria:
        - id: STK-REQ-047-AC-01
          text: Given CLI initialization, when command setup runs more than once, then the global command application is configured once and the expected top-level commands are available.
          verification_method: test
          derived_reqs:
            - SYS-REQ-135
        - id: STK-REQ-047-AC-02
          text: Given a start command invocation, when local start flags are parsed, then the configured global start flag pointers receive the selected values and the default start action is selected.
          verification_method: test
          derived_reqs:
            - SYS-REQ-135
        - id: STK-REQ-047-AC-03
          text: Given a plugin load command invocation, when the local plugin file cannot be loaded or the loader panics, then an explicit local error is returned instead of silently accepting the input.
          verification_method: test
          derived_reqs:
            - SYS-REQ-135
        - id: STK-REQ-047-AC-04
          text: Given a version command invocation, when text or JSON output is requested, then the local version helper emits deterministic build and runtime fields.
          verification_method: test
          derived_reqs:
            - SYS-REQ-135
