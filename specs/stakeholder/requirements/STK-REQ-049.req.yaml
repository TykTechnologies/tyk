stakeholder:
    persona: Enterprise gateway operator
    story: As an enterprise gateway operator, I need upstream OAuth middleware to install the intended upstream bearer-token provider before reverse-proxy code consumes request context.
    acceptance_criteria:
        - id: STK-REQ-049-AC-01
          text: Given upstream authentication and upstream OAuth settings, when local middleware evaluates enablement, then it enables only when both upstream authentication and OAuth are enabled.
          verification_method: test
          derived_reqs:
            - SYS-REQ-137
        - id: STK-REQ-049-AC-02
          text: Given enabled client-credentials OAuth settings and a local token endpoint response, when local middleware processes requests, then it obtains or reuses a bearer token and stores an upstream authentication provider for the configured header.
          verification_method: test
          derived_reqs:
            - SYS-REQ-137
        - id: STK-REQ-049-AC-03
          text: Given enabled password-grant OAuth settings and a local token endpoint response, when local middleware processes requests, then it obtains or reuses a bearer token and stores an upstream authentication provider for the configured header.
          verification_method: test
          derived_reqs:
            - SYS-REQ-137
        - id: STK-REQ-049-AC-04
          text: Given cached token data or OAuth response metadata and a configured metadata key list, when local OAuth helpers process token data, then only non-empty selected metadata keys are stored in request context.
          verification_method: test
          derived_reqs:
            - SYS-REQ-137
        - id: STK-REQ-049-AC-05
          text: Given invalid OAuth provider configuration or a token acquisition/cache failure, when local OAuth helpers run, then they return explicit local errors and emit the local OAuth error event where middleware error handling owns the failure.
          verification_method: test
          derived_reqs:
            - SYS-REQ-137
