          testable: true
          derived_reqs:
            - SYS-REQ-111
        - id: STK-REQ-023-AC-03
          text: Given stored or file-backed certificate and public-key identifiers, when list, raw retrieval, index listing, delete, cache flush, or cert-pool construction is requested, then local storage/cache/index state and fallback decisions are deterministic.
          testable: true
          derived_reqs:
            - SYS-REQ-111
