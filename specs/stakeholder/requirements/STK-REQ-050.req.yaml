stakeholder:
    persona: Gateway operator
    story: As a gateway operator, I need local analytics records to preserve response, detail, path, GeoIP, and configured tag metadata so operational analytics consumers receive the intended gateway signal.
    acceptance_criteria:
        - id: STK-REQ-050-AC-01
          text: Given configured analytics serialization, when gateway requests produce error or success outcomes, then flushing analytics writes decodable records with the expected response codes to the configured analytics storage key.
          verification_method: test
          derived_reqs:
            - SYS-REQ-138
        - id: STK-REQ-050-AC-02
          text: Given detailed analytics settings, cache hits, upstream timeout behavior, or chunked upstream responses, when gateway analytics records are flushed, then detailed request/response, latency, cache/error status, API key, and de-chunked response metadata are preserved as applicable.
          verification_method: test
          derived_reqs:
            - SYS-REQ-138
        - id: STK-REQ-050-AC-03
          text: Given configured GeoIP support, when analytics GeoIP lookup receives empty, valid, or malformed address input, then it returns the expected local lookup result or explicit local error.
          verification_method: test
          derived_reqs:
            - SYS-REQ-138
        - id: STK-REQ-050-AC-04
          text: Given enabled analytics URL normalization, when paths contain UUID, ULID, numeric, or configured custom fragments, then local normalization replaces only the configured fragments with stable placeholders.
          verification_method: test
          derived_reqs:
            - SYS-REQ-138
        - id: STK-REQ-050-AC-05
          text: Given configured analytics tag headers and an existing tag list, when request headers are inspected, then matching header values are appended as lower-case header-value tags while non-configured headers are ignored.
          verification_method: test
          derived_reqs:
            - SYS-REQ-138
        - id: STK-REQ-050-AC-06
          text: Given local stream analytics configuration and HTTP or WebSocket stream responses, when stream recorders and response writers are created or used, then the correct recorder/writer type is selected and write or hijack paths record the expected local analytics status and request metadata.
          verification_method: test
          derived_reqs:
            - SYS-REQ-138
