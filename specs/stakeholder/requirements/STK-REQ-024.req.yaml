rationale: Startup diagnostics protect operators from silently running with risky local configuration. This stakeholder requirement owns only local checkup helper behavior; it does not claim operating-system tuning, log transport delivery, operator remediation, gateway request admission, analytics pipeline durability, or final client-visible behavior.
