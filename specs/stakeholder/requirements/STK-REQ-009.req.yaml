          verification_method: test
          derived_reqs:
            - SYS-REQ-082
        - id: STK-REQ-009-AC-03
          text: Given an HTTP request, when request encoding is requested, then a writable request returns base64 wire-format data and an unwritable request returns an empty encoding result.
