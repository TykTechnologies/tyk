stakeholder:
    persona: Gateway operator
    story: As a gateway operator, I need local gateway configuration loading to apply defaults, file overlays, environment overrides, and typed decoders predictably before runtime components consume the configuration.
    acceptance_criteria:
        - id: STK-REQ-028-AC-01
          text: Given default, partial, or locally inspected configuration input, when local configuration helpers load, write, or inspect configuration, then documented defaults and supported explicit values are preserved deterministically with sensitive values redacted.
          verification_method: test
          derived_reqs:
            - SYS-REQ-116
        - id: STK-REQ-028-AC-02
          text: Given multiple configuration files, environment overrides, or environment inspection requests, when local configuration support runs, then later files and environment values override earlier/default values according to local loader rules and env mappings remain inspectable through local helper output.
          verification_method: test
          derived_reqs:
            - SYS-REQ-116
        - id: STK-REQ-028-AC-03
          text: Given missing files, malformed decoder input, unsupported tracing configuration shape, missing inspection fields/env vars, unauthenticated inspection requests, or viewer initialization errors, when local configuration helpers run, then an explicit local error, denial, or warning path is returned.
          verification_method: test
          derived_reqs:
            - SYS-REQ-116
