description: Gateway API import CLI tooling shall give operators predictable local command behavior for selecting Blueprint, Swagger, and WSDL import modes, validating required local command inputs, loading local source/API definition files, and printing generated API definition JSON without claiming full import conversion correctness, gateway API loading, route generation, persistence, or final runtime request behavior.
