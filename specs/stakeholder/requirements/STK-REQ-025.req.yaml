obligation_checklist:
    - nominal
    - boundary
    - error_handling
    - security
stakeholder:
    persona: Gateway operator
    story: As a gateway operator, I need plugin bundle tooling to produce deterministic local bundle archives and reject bad bundle inputs before distributing them to a gateway.
    acceptance_criteria:
        - id: STK-REQ-025-AC-01
          text: Given a valid plugin bundle manifest with existing files, at least one middleware hook, and a driver, when the bundle build command runs with skip-signing, then a ZIP archive is written with the bundled file and updated manifest checksum.
          testable: true
          derived_reqs:
            - SYS-REQ-113
        - id: STK-REQ-025-AC-02
          text: Given a missing manifest, malformed JSON, missing driver, missing hooks, or missing bundled file, when bundle validation or build runs, then an explicit local error is returned and the bad input is not accepted as a valid bundle.
          testable: true
          derived_reqs:
            - SYS-REQ-113
        - id: STK-REQ-025-AC-03
          text: Given a valid private signing key, when the bundle build command signs the bundled bytes, then the updated manifest contains a base64 signature that verifies against the corresponding public key.
          testable: true
          derived_reqs:
            - SYS-REQ-113
