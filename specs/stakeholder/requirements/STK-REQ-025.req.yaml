id: STK-REQ-025
version: 1
status: approved
priority: shall
category: operational
req_type: guarantee
fretish: ""
description: Gateway plugin bundle tooling shall let operators build deterministic local plugin bundle archives from manifests, reject malformed or incomplete bundle inputs, and optionally attach a verifiable local signature without claiming gateway plugin loading or runtime plugin execution.
formalization_strategy: informal
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: plugin_bundle_cli
rationale: Plugin bundle creation is operator-facing CLI support. This stakeholder requirement owns only local bundle command behavior; it does not claim bundle distribution, gateway-side signature verification, plugin loading, plugin execution, hot reload, persistence, or final gateway request behavior.
tags:
    - cli
    - plugin-bundle
    - manifest
    - signing
variables: []
traces: {}
verification:
    assurance_level: A
    formalization_status: none
    review:
        status: approved
        reviewer: human:buger
        role: requirements_owner
        reviewed_at: "2026-06-20T08:59:32Z"
        comment: >-
            Reviewed under explicit chat delegation from human:buger to agent:codex on 2026-06-20. Plugin bundle CLI scope is limited to local cli/bundler/bundler.go behavior: bundle command registration, default flag wiring, manifest loading, JSON parse errors, manifest validation for existing files/hooks/drivers, explicit local errors for malformed inputs, unsigned bundle confirmation bypass through skip-signing, checksum calculation over bundled file bytes, ZIP archive creation with bundled files and updated manifest, RSA private-key signing, and verifiable signature storage. Focused bundler tests passed, including race, and the cli/bundler package was added to configured build/test/lint gates. This approval does not claim gateway-side signature verification, plugin loading, plugin execution, bundle distribution, persistence, hot reload, or final gateway request behavior.
