id: STK-REQ-003
version: 1
status: review
priority: shall
category: functional
req_type: guarantee
fretish: ""
description: The policy engine shall enforce rate limits using highest-rate-wins semantics when merging rate limits from multiple policies or API-level limits. Empty rate limits must never be applied, and equal rate limits must preserve the existing value.
formalization_strategy: ""
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: Rate limiting protects backend APIs from overload. The highest-rate-wins rule ensures that the most permissive policy governs when multiple policies apply, which is the correct business semantic for Tyk's multi-policy model. Applying empty (zero) rate limits would effectively disable API access.
