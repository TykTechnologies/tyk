description: Gateway configuration lint tooling shall give operators predictable local validation feedback for configuration files by rejecting malformed or unsupported configuration shapes, preserving legacy-compatible input where supported, reporting schema and custom format warnings, and rewriting accepted configuration through the local configuration writer without claiming complete gateway configuration semantics or runtime behavior.
