stakeholder:
    persona: Gateway extension developer
    story: As a gateway extension developer using Python coprocess support, I need local Python runtime discovery and binding helpers to behave predictably before gateway integration code invokes Python hooks.
    acceptance_criteria:
        - id: STK-REQ-048-AC-01
          text: Given available python-config executables, when the local loader scans supported PATH entries, then it selects the latest version by default, accepts an explicitly requested version, and returns explicit errors for empty PATH, missing installations, or missing requested versions.
          verification_method: test
          derived_reqs:
            - SYS-REQ-136
        - id: STK-REQ-048-AC-02
          text: Given a selected python-config executable, when ldflags output identifies a Python library directory and name, then the local loader resolves the platform-specific dynamic library path and rejects missing libraries.
          verification_method: test
          derived_reqs:
            - SYS-REQ-136
        - id: STK-REQ-048-AC-03
          text: Given a dynamic library exporting the required Python C API symbols, when loader initialization and helper wrappers run, then symbol mapping succeeds and representative module, tuple, object, bytes, long, reference, and path helpers return deterministic local results or explicit local errors.
          verification_method: test
          derived_reqs:
            - SYS-REQ-136
