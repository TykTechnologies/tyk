id: STK-REQ-005
version: 1
status: review
priority: shall
category: functional
req_type: guarantee
fretish: ""
description: The policy engine shall enforce strict error reporting for all failure conditions. When an error occurs (policy not found, organization mismatch, invalid configuration), no policy fields shall be merged into the session. Error and success states are mutually exclusive.
formalization_strategy: ""
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: policy
rationale: Partial policy application is a security risk. If an error occurs mid-apply but some fields have already been merged, the session state becomes corrupted -- potentially granting access that should have been denied. Atomic error handling ensures either full success or full failure.
tags:
    - error-handling
    - security-critical
    - atomicity
