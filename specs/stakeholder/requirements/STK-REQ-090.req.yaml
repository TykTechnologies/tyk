description: Gateway trace manager support shall preserve deterministic local tracing helper behavior for tested inputs by storing and reading service IDs in request contexts, enabling and disabling the global trace manager, registering configured tracer factories for services, returning no-op tracers when no service tracer is available, wrapping handlers with root-span setup, forwarding span extraction and injection to the selected tracer, forwarding helper log messages to both the supplied logger and active span, and selecting supported local tracing providers by name, without claiming trace export delivery, collector connectivity, runtime sampling correctness, full gateway trace propagation, final client responses, configured logger use during AddTracer, or close-error propagation from registered tracers.
