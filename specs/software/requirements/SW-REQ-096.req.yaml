description: The apidef/streams validator helpers shall preserve local Tyk Streams OAS validation support behavior by loading embedded OAS and Tyk extension schemas once, injecting x-tyk-streaming and x-tyk-api-gateway schemas into supported OAS minor-version schemas, registering default and enable-all-experimental Bento validators, selecting a deterministic default OAS minor version with the current 3.0 override, resolving requested major, minor, and patch versions to supported minor schemas, validating Tyk Streams OAS objects and templates through the local gojsonschema facade, relaxing template-required Tyk extension fields for templates, returning aggregated OAS validation errors and explicit version or malformed-document errors, applying default per-stream Bento configuration validation with stream-scoped error context, and honoring enable-all or disable-validator flows that bypass Bento configuration validation without claiming embedded schema completeness, Bento schema completeness, stream configuration semantic correctness, stream runtime execution, gateway API loading, route generation, request matching, gateway request admission, persistence, analytics, or final client-visible behavior.
