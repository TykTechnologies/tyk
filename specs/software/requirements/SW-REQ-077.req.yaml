description: The apidef/adapter GraphQL engine v3 supergraph adapter shall preserve API-definition support adapter behavior by converting non-empty supergraph subgraph entries into federation-enabled GraphQL datasource configurations; skipping subgraphs with empty SDL; merging subgraph headers with global headers using subgraph precedence and canonical HTTP names; converting internal Tyk subgraph URLs to HTTP URLs with the internal API header; mapping subgraph subscription type settings; constructing federation engine configuration with caller-supplied HTTP, streaming, and subscription-client factory inputs; setting merged supergraph SDL before engine configuration generation; returning merged-SDL or engine configuration errors; and producing deterministic subgraph datasource and engine configuration for repeated equivalent input.
