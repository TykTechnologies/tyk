description: The apidef/oas server-regeneration helpers and gateway-side OAS server orchestration helpers shall preserve API-definition support server shapes by deriving Tyk-managed absolute and relative server URLs from custom domains, default gateway hosts, gateway listen configuration, edge endpoints, API tags, hybrid mode, listen paths, and base or child versioning configuration; by generating URL-path, query-parameter, and header-versioned server URLs with fallback-to-default and external-child direct-access behavior preserved; by removing previously generated Tyk servers while preserving user-provided servers and deduplicating normalized URLs; by extracting user-provided servers from mixed server lists; by dispatching new-API, update, child-cascade, and old-default-child regeneration helper flows deterministically; by reporting generated invalid server-template errors; and by producing deterministic repeated generation results.
