description: The apidef/adapter GraphQL universal-data-graph engine adapter shall preserve API-definition support adapter behavior by parsing API-definition GraphQL schema only when no caller-supplied schema is present; preserving caller field configuration path and default-mapping settings; adding schema-derived field argument configurations; converting REST data sources into REST datasource configurations with extracted URL query parameters, explicit query variables, headers, method, and body; converting GraphQL data sources into GraphQL datasource configurations with caller-supplied HTTP, streaming, and subscription-client factory inputs; converting GraphQL operation data sources into REST datasource configurations; converting Kafka data sources into Kafka subscription datasource configurations; deriving non-REST child-node metadata from schema and root datasource fields; propagating schema, datasource JSON, URL query, GraphQL operation, and datasource factory errors; and producing deterministic field and datasource configuration for repeated equivalent input.
