id: SW-REQ-060
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: ""
description: The apidef/oas validator helpers shall preserve API-definition support schema-validation behavior by selecting the OAS definitions key from embedded schema data, loading embedded OAS schemas with the Tyk extension schema injected under each supported OAS version, choosing a deterministic default schema version, resolving requested major, minor, and patch versions to a supported minor schema, validating OAS objects and OAS templates against the selected schema, allowing templates with intentionally omitted Tyk extension required fields, returning aggregated validation errors for malformed documents, and returning explicit errors for unsupported or malformed schema-version requests.
formalization_strategy: informal
informal_verification:
    method: unit_tests
    evidence: apidef/oas/validator_reqproof_test.go; docs/apidef-requirements-evidence.md
    verified: true
parent: SYS-REQ-104
component: model
rationale: This software requirement owns only the local apidef/oas embedded-schema loading and validation helper behavior used by API-definition support models. It does not claim correctness of the upstream gojsonschema library, completeness of embedded OpenAPI schemas, API import, route generation, request matching, gateway request admission, persistence, middleware execution, or final client-visible validation responses.
