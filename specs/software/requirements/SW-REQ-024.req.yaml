description: The internal/jsonrpc/errors package shall map HTTP statuses to deterministic JSON-RPC error codes and write JSON-RPC 2.0 error response bodies that preserve the mapped code, message, HTTP status data, request ID when encodable, content type, HTTP status, and returned analytics body, while falling back to a generic internal-error body if response marshaling fails.
