rationale: This software requirement owns root internal/otel package mechanics and focused package tests only. Its formal model is decomposed into trace configuration/defaulting, runtime metric enablement, metric provider and instrument construction, local metric recording, API metric delegation, trace provider fallback, resource attributes, and span context helper outputs so each behavior can be reviewed and witnessed independently. API metric extraction internals are covered by SW-REQ-167, and integrated gateway observability delivery is outside this proof slice.
