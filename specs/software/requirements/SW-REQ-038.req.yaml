description: The dnscache manager shall construct disabled managers with a configured multi-IP strategy, expose and replace cache storage, report whether caching is enabled, initialize storage only when disabled, wrap dial requests through cached host lookup when enabled, bypass cache lookup for disabled caching or IP literals, reject malformed host:port addresses, select cached addresses according to pick-first, no-cache, and random strategies, delete cached host entries after failed cached dials, and clear storage when disposing an enabled cache.
