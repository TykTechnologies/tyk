id: SW-REQ-182
version: 1
status: approved
priority: shall
category: gateway_upstream_tls_validation
req_type: guarantee
fretish: the gateway_upstream_tls_validation shall always satisfy (gateway_upstream_tls_pinning_enablement_determined & gateway_upstream_tls_fingerprint_selection_determined & gateway_upstream_tls_pin_match_determined & gateway_upstream_tls_pin_mismatch_determined & gateway_upstream_tls_disabled_and_global_pins_determined & gateway_upstream_tls_proxy_pinning_determined & gateway_upstream_tls_common_name_determined)
description: "The gateway package implementation shall preserve seven focused upstream TLS validation mechanisms: public-key pin enablement, pinned fingerprint selection from API and global maps, API pin match acceptance, pin mismatch rejection, API pinning-disabled fallback and global pin behavior, tested proxy pinning behavior, and forced CommonName validation for tested direct and proxied upstream inputs. This requirement does not claim complete TLS handshake semantics, certificate chain policy correctness, arbitrary proxy behavior, downstream client certificate selection, TLS version or cipher policy, certificate material storage durability, route generation, authentication enforcement, distributed synchronization, or final client-visible gateway behavior outside the focused upstream TLS validation tests."
formalization_strategy: fretish
informal_verification:
    method: unit_tests
    evidence: gateway/cert_test.go; gateway/cert_old_test.go; docs/gateway-upstream-tls-validation-requirements-evidence.md
    verified: true
parent: SYS-REQ-194
component: gateway_upstream_tls_validation
rationale: This software requirement owns local gateway/cert.go public-key pinning and CommonName validation helper mechanics under focused gateway package tests only. Its formal model is decomposed into pin enablement, fingerprint selection, match, mismatch, disabled/global behavior, proxy pinning, and CommonName outputs so each behavior can be reviewed and witnessed independently. Broader TLS transport and certificate-management semantics remain outside this proof slice.
