description: The apidef/adapter AsyncAPI adapter shall preserve API-definition support adapter behavior by parsing AsyncAPI input into a new active GraphQL execution-engine API definition; translating Kafka server settings into GraphQL Kafka data-source configuration; converting AsyncAPI channel and binding argument names into GraphQL argument templates; using channel-specific server selection when present and a default configured server otherwise; sorting generated field configurations and data sources deterministically by name; printing the imported GraphQL schema; and returning explicit errors for malformed AsyncAPI input, unsupported server protocols, missing server URLs, invalid Kafka data-source configuration, and GraphQL schema import or printing failures.
formalization_strategy: informal
informal_verification:
    method: unit_tests
    evidence: apidef/adapter/asyncapi_test.go; docs/apidef-requirements-evidence.md
    verified: true
