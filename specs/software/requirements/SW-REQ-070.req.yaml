component: model
rationale: This software requirement owns only the local apidef/adapter AsyncAPI adapter behavior used to create API-definition support shapes from AsyncAPI documents and Kafka subscription metadata. It does not claim complete AsyncAPI specification coverage, correctness of the upstream AsyncAPI parser or GraphQL translator, OpenAPI import correctness, downstream GraphQL engine adapter correctness, GraphQL execution, Kafka connectivity or consumption behavior, gateway API loading, route generation, request matching, gateway request admission, middleware execution, upstream availability, persistence, analytics, or final client-visible runtime behavior.
