rationale: This software requirement owns only the local internal/service/newrelic adapter helpers used by observability setup. It does not claim New Relic backend availability, network delivery, dashboard ingestion, correctness of the upstream New Relic agent or Gorilla integration, gateway middleware ordering outside this adapter, analytics persistence, trace/span semantic correctness, or final client-visible HTTP behavior.
