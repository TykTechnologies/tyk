id: SW-REQ-067
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: ""
description: The internal/service/newrelic helpers shall preserve observability adapter behavior by exposing the upstream New Relic application, transaction, config, and logger symbols used by callers; mounting New Relic Gorilla middleware only when an application is configured; renaming request transactions to the request URL path when a transaction exists while still calling the next handler without a transaction; formatting health sink custom-event names for events, errors, timings, completions, and gauges while preserving key/value parameters; and forwarding New Relic logger messages with fields at error, warn, info, and debug levels with debug-enabled state matching the wrapped logrus entry.
formalization_strategy: informal
informal_verification:
    method: unit_tests
    evidence: internal/service/newrelic/newrelic_reqproof_test.go; internal/service/newrelic/newrelic_test.go; docs/event-requirements-evidence.md
    verified: true
