description: The apidef/adapter GraphQL proxy-only engine adapter shall preserve API-definition support adapter behavior by parsing the API-definition GraphQL schema when no schema is supplied, reusing a caller-supplied schema when present, converting proxy request headers into static upstream headers, converting internal Tyk proxy URLs to HTTP URLs with the internal API header, mapping proxy subscription settings into engine subscription configuration including SSE POST mode, passing caller-supplied HTTP and streaming clients into the generated datasource factory, using the configured subscription-client factory or default, disabling single-flight on the generated engine configuration, exposing schema-derived datasource and field argument configuration, returning schema parse or engine configuration errors, and producing deterministic engine configuration for repeated equivalent input.
