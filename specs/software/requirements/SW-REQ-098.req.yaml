description: The certs certificate manager helpers shall preserve local certificate lifecycle behavior by constructing managers with default and configured retry/cache settings, parsing encrypted or unencrypted PEM blocks, deriving stable certificate and public-key IDs, rejecting malformed, expired, duplicate, mixed public-key/certificate, multiple-private-key, and mismatched private-key material, storing certificate chains with encrypted private keys, preserving organization-scoped indexes, listing storage-backed and file-backed certificates according to public/private/any modes, listing and parsing public keys, returning raw stored material, deleting storage/cache/index entries, building CA pools from certificate entries while skipping raw public keys, flushing cache entries, and exposing certificate metadata and masked IDs without claiming TLS handshake enforcement, mutual-TLS request authentication, upstream TLS validation, live MDCB availability, Redis durability, certificate expiry monitoring, or gateway request admission.
