description: The apidef/adapter GraphQL engine adapter utility helpers shall preserve API-definition support adapter behavior by parsing and normalizing schema strings; mapping API-definition subscription modes to engine WebSocket protocol names and GraphQL subscription types; converting and deduplicating API-definition headers with canonical names and first-map precedence; converting GraphQL data-source operations into REST datasource payloads only when an operation is present; constructing engine GraphQL datasource fetch and subscription configuration including internal Tyk URLs, internal API headers, SSE flags, and SSE POST mode; preserving field-argument configuration order; extracting URL query parameters into deterministic engine query configuration while appending explicit API-definition query variables; constructing GraphQL datasource factories with caller-supplied HTTP clients and subscription clients; rejecting invalid subscription-client factory outputs; and defaulting missing subscription-client factories to the upstream default factory.
formalization_strategy: informal
informal_verification:
    method: unit_tests
    evidence: apidef/adapter/gqlengineadapter/utils_reqproof_test.go; docs/apidef-requirements-evidence.md
    verified: true
