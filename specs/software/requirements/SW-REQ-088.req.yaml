description: The apidef/oas default-extension helpers shall deterministically build local x-tyk-api-gateway default support shapes from OAS info, servers, paths, security requirements, and explicit override parameters by preserving import-only state, listen-path, context-variable, traffic-log, API ID, custom-domain, upstream URL, security-processing-mode, authentication, and operation-middleware defaults; substituting server variables only when default values are available; returning controlled errors for missing servers, missing server-variable defaults, unresolved server variables, invalid manual upstream URLs, invalid server URLs, and missing security requirements; parsing request query override values with whitespace trimming and boolean validation; mapping authentication source selectors; importing distinct supported security schemes once while deriving base identity-provider precedence; and pruning obsolete or empty local operation middleware entries without panics.
