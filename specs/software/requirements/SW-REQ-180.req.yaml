rationale: This software requirement owns local gateway/batch_requests.go helper behavior and route-registration wiring under focused gateway package tests only. Its formal model is decomposed into endpoint handling, request construction, execution collation, manual virtual-endpoint execution, TLS outcomes, and reply encoding so each behavior can be reviewed and witnessed independently. Broader nested request enforcement, transport semantics, and full route generation remain outside this proof slice.
