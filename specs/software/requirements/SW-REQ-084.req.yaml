id: SW-REQ-084
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: ""
description: The apidef/importer WSDL importer shall load WSDL 1.1 definitions into its typed model, reject malformed roots and WSDL 2.0 definitions, preserve service-port mapping on each importer instance without leaking mappings across importer instances, convert selected SOAP 1.1, SOAP 1.2, and HTTP bindings over HTTP into versioned Classic API track-endpoint and URL-rewrite metadata, apply HTTP urlReplacement wildcard conversion, reject unsupported transports, missing ports, missing selected ports, missing HTTP operation locations, and empty service sets as errors instead of panics, insert converted versions into API definitions as versioned entries, and build active keyless Classic API definitions with deterministic versioning and proxy shape apart from the generated API ID while ignoring the unsupported mock flag at the top-level API-definition build entry point.
formalization_strategy: informal
informal_verification:
    method: unit_tests
    evidence: apidef/importer/wsdl_reqproof_test.go; docs/apidef-requirements-evidence.md
    verified: true
parent: SYS-REQ-104
component: model
rationale: This software requirement owns only local apidef/importer/wsdl.go WSDL importer shape conversion into Classic API definition data. It does not claim complete WSDL specification support, WSDL 2.0 support, full XML schema or message validation, regex escaping semantics for arbitrary HTTP endpoint metacharacters, partial multi-service failure semantics, mock import support, upstream availability, gateway API loading, route generation, request matching, gateway request admission, persistence, analytics, or final client-visible runtime behavior.
