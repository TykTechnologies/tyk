description: The apidef/adapter GraphQL engine v3 proxy-only adapter shall preserve API-definition support adapter behavior by parsing API-definition GraphQL schema only when no caller-supplied schema is present; converting proxy request headers into static upstream headers; converting internal Tyk proxy target URLs to HTTP URLs with the internal API header; mapping proxy subscription type settings; constructing proxy engine configuration with caller-supplied HTTP, streaming, and subscription-client factory inputs; preserving schema-derived datasource and field argument configuration; propagating schema parse or proxy engine configuration errors; and producing deterministic proxy datasource and field configuration for repeated equivalent input.
