rationale: >-
    This software requirement owns only the local apidef/validator.go Classic API definition validation helper behavior: ValidationResult state aggregation, configured rule dispatch, duplicate GraphQL data-source name checks, enabled-auth-source checks, IP/CIDR syntax checks for enabled lists, hard-timeout boundary checks, upstream-auth configuration checks, and load-balancing target checks. It does not claim gateway API loading, route generation, request matching, gateway request admission, runtime authentication execution, upstream request execution, load-balancer traffic distribution, GraphQL execution, persistence, analytics, invalid-index ErrorAt behavior, or final client-visible behavior.
