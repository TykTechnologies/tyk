description: The apidef Classic API definition validator helpers shall preserve local validation support behavior by aggregating validation errors and validity state, dispatching configured validation rules in order, exposing the default validation rule set, detecting duplicate GraphQL data source names after trimming and case normalization, requiring at least one enabled auth source for enabled auth mechanisms, validating enabled IP allow/block list entries as IP or CIDR values, rejecting negative hard-timeout values, detecting invalid upstream authentication combinations and OAuth authorization-type configuration, and requiring at least one expanded load-balancing target when load balancing is enabled without claiming gateway API loading, route generation, request matching, gateway request admission, runtime authentication execution, upstream request execution, load-balancer traffic distribution, GraphQL execution, persistence, analytics, invalid-index ErrorAt behavior, or final client-visible behavior.
