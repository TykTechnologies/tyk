description: The internal rate limiter adapter package shall construct limiter adapters with default clock, logger, and lock state, choose local storage and no-op locking when no Redis client is configured, choose Redis-backed storage and Redis locks when a Redis client is configured, and delegate fixed-window, sliding-window, token-bucket, and leaky-bucket calls to the external limiter package while returning the resulting wait duration or exhaustion error.
