description: The apidef/adapter GraphQL engine v3 adapter utility helpers shall preserve API-definition support adapter behavior by converting API-definition headers to canonical HTTP headers; converting GraphQL operation data-source definitions into REST datasource configuration; returning an explicit missing-operation error for GraphQL operation conversion without an operation; creating ordered field-argument configurations; deterministically extracting URL query parameters and appending explicit API-definition query variables; returning invalid URL query errors; mapping GraphQL subscription types to websocket subprotocols; constructing GraphQL datasource factories with caller-supplied HTTP, streaming, and subscription-client factory inputs; and returning explicit errors when a subscription-client factory produces an incompatible client.
