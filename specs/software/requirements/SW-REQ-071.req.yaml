id: SW-REQ-071
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: ""
description: The apidef/adapter OpenAPI adapter shall preserve API-definition support adapter behavior by parsing OpenAPI input into a new active GraphQL execution-engine API definition; translating supported GET operations into GraphQL query REST data sources and supported POST, PUT, and DELETE operations into GraphQL mutation REST data sources; constructing REST URLs from the first server, path arguments, and query parameters as GraphQL argument templates; deriving field names from operation IDs or endpoint/method fallbacks; adding request-body argument templates for JSON request bodies; sorting generated field configurations and data sources deterministically by name; printing the imported GraphQL schema; and returning explicit errors for malformed OpenAPI input, nil or serverless documents, malformed server URLs, missing JSON request-body media, missing request-body schemas, and GraphQL schema import or printing failures.
formalization_strategy: informal
informal_verification:
    method: unit_tests
    evidence: apidef/adapter/openapi_test.go; docs/apidef-requirements-evidence.md
    verified: true
parent: SYS-REQ-104
component: model
rationale: This software requirement owns only the local apidef/adapter OpenAPI adapter behavior used to create API-definition support shapes from OpenAPI documents and REST operation metadata. It does not claim complete OpenAPI specification coverage, correctness of the upstream OpenAPI parser or GraphQL translator, AsyncAPI import correctness, downstream GraphQL engine adapter correctness, REST upstream availability, GraphQL execution, gateway API loading, route generation, request matching, gateway request admission, middleware execution, persistence, analytics, or final client-visible runtime behavior.
